<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phishing Awareness Game</title>

  <!-- CSS File -->
  <link rel="stylesheet" href="prototype-v1.css"/>
</head>

<body>

  <div class="container">

    <div class="left-section">

      <div class="logo-area">
        <img class="logo-icon" src="logo.png" alt="Phishing awareness game logo" />

        <div>
          <h1>Welcome!</h1>
          <h2>Email Safety Starts with You</h2>
        </div>
      </div>

      <p class="description">
        Learn practical email safety with a short, realistic quiz.
        No  fake hype — just real phishing awareness in minutes.
      </p>

      <div class="callout">
        <p>Ready for a quick confidence check? Start with a single click.</p>
      </div>

      <div class="button-row">
        <button class="start-btn">Start Quiz →</button>
        <a class="secondary-btn" href="instruction.html" target="_blank">See Instructions →</a>
      </div>

    </div>


    <div class="right-section">

      <div class="right-image">
        <video class="right-video" autoplay muted loop playsinline poster="welcone.png">
          <source src="phishing.mp4" type="video/mp4" />
          Your browser does not support the video element.
        </video>
      </div>

      <div class="quote-box">
        <div class="quote-icon">📩</div>

        <div>
          <h4>Think Before You Click.</h4>
          <p>Spot Phishing. Stop Scams.</p>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
